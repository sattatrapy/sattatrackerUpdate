name: Update CDN

on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move latest tag to HEAD
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git tag -f latest
          git push -f origin latest

      - name: Purge jsDelivr branch
        run: curl -s "https://purge.jsdelivr.net/gh/sattatrapy/sattatrackerUpdate@main"

      - name: Verify CDN
        run: |
          sleep 3
          VERSION=$(curl -s "https://cdn.jsdelivr.net/gh/sattatrapy/sattatrackerUpdate@latest/latest.json" | grep '"version"' | head -1)
          echo "CDN serving: $VERSION"
