name: Purge jsDelivr CDN

on:
  push:
    branches: [main]

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge branch reference
        run: curl -s "https://purge.jsdelivr.net/gh/sattatrapy/sattatrackerUpdate@main"

      - name: Wait
        run: sleep 3

      - name: Purge latest.json
        run: curl -s "https://purge.jsdelivr.net/gh/sattatrapy/sattatrackerUpdate@main/latest.json"

      - name: Wait
        run: sleep 5

      - name: Verify CDN
        run: |
          VERSION=$(curl -s "https://cdn.jsdelivr.net/gh/sattatrapy/sattatrackerUpdate@main/latest.json" | grep '"version"' | head -1)
          echo "CDN serving: $VERSION"
